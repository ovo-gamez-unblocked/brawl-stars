<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Player</title>

<style>
body {
  margin: 0;
  background: #000;
}

/* wrapper */
.game-wrapper {
  position: relative;
  width: 100%;
  height: 100vh;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* aspect ratio fix (16:9) */
.game-container {
  position: relative;
  width: 100%;
  max-width: 1280px;
  aspect-ratio: 16 / 9;
}

/* iframe full fit */
.game-container iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* fullscreen button */
.fullscreen-btn {
  position: absolute;
  bottom: 10px;
  right: 10px;
  background: #000;
  color: #fff;
  padding: 8px 12px;
  font-size: 14px;
  cursor: pointer;
  border: 1px solid #fff;
}
</style>
</head>

<body>

<div class="game-wrapper">
  
  <div class="game-container">
    
    <iframe 
      src="https://basketball-games.xyz/brawl-stars/iframe.html"
      allowfullscreen>
    </iframe>

    <div class="fullscreen-btn" onclick="goFullScreen()">Fullscreen</div>

  </div>

</div>

<script>
function goFullScreen() {
  const elem = document.querySelector(".game-container");
  if (elem.requestFullscreen) elem.requestFullscreen();
  else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
  else if (elem.msRequestFullscreen) elem.msRequestFullscreen();
}
</script>

</body>
</html>
